services:
  - type: web
    name: cropstress-backend
    runtime: python
    buildCommand: pip install -r cropstress_back/cropstress_back-main/requirements.txt
    startCommand: cd cropstress_back/cropstress_back-main && uvicorn pipeline:app --host 0.0.0.0 --port 8000
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false